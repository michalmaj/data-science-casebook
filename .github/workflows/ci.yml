name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Lint
        run: uv run --locked ruff check .
      - name: Run lesson self-checks against reference solutions
        run: LESSON_MODULE=solution uv run --locked pytest
      - name: Check bilingual Markdown pairs
        run: uv run --locked python tools/check_bilingual_pairs.py
