name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Run lesson self-checks against reference solutions
        run: LESSON_MODULE=solution uv run pytest
      - name: Check bilingual Markdown pairs
        run: uv run python tools/check_bilingual_pairs.py
